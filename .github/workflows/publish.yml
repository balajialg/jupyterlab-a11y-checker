name: Release & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Default GITHUB_TOKEN is enough: publishing runs in this same workflow
    # (gated on the outputs below), so there is no second workflow to trigger.
    outputs:
      extension_released: ${{ steps.release.outputs['packages/extension--release_created'] }}
      cli_released: ${{ steps.release.outputs['packages/cli--release_created'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish-extension:
    needs: release-please
    if: needs.release-please.outputs.extension_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip build "jupyterlab>=4.0.0,<5"

      - name: Install dependencies and build extension assets
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
          YARN_CHECKSUM_BEHAVIOR: update
        run: |
          set -eux
          jlpm install
          npm run build -w packages/core
          npm run build:prod -w packages/extension

      - name: Build Python package
        working-directory: packages/extension
        run: python -m build

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/extension/dist
          skip-existing: true

  publish-cli:
    needs: release-please
    if: needs.release-please.outputs.cli_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies and build CLI
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
          YARN_CHECKSUM_BEHAVIOR: update
        run: |
          set -eux
          jlpm install
          npm run build -w packages/core
          npm run build -w packages/cli

      - name: Publish to npm via Trusted Publishing
        working-directory: packages/cli
        run: npm publish --provenance --access public

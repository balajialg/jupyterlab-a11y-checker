name: Release & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Force-publish a package (normally automatic on release)"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - cli
          - extension

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Default GITHUB_TOKEN is enough: publishing runs in this same workflow
    # (gated on the outputs below), so there is no second workflow to trigger.
    outputs:
      extension_released: ${{ steps.release.outputs['packages/extension--release_created'] }}
      cli_released: ${{ steps.release.outputs['packages/cli--release_created'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  # Posts a verbatim, per-package list of commit titles on each open release PR
  # (a "sticky" comment, updated in place). This is raw git history, separate
  # from release-please's parsed Features/Bug Fixes changelog.
  pr-commit-list:
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comment commit lists on release PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          marker="<!-- raw-commit-list -->"

          post() {
            pkg="$1"; path="$2"; tagprefix="$3"
            branch="release-please--branches--main--components--$pkg"
            pr=$(gh pr list --repo "$REPO" --head "$branch" --state open --json number --jq '.[0].number // empty')
            if [ -z "$pr" ]; then echo "No open release PR for $pkg; skipping."; return; fi

            lasttag=$(git tag --list "${tagprefix}*" --sort=-creatordate | head -1 || true)
            if [ -n "$lasttag" ]; then range="${lasttag}..HEAD"; else range=""; fi
            commits=$(git log $range --no-merges --pretty=format:'- %s (%h)' -- "$path" || true)
            [ -z "$commits" ] && commits="_No commits found for this package since the last release._"

            body=$(printf '%s\n### Commits in this release (%s)\n\n%s\n' "$marker" "$pkg" "$commits")

            cid=$(gh api "repos/$REPO/issues/$pr/comments" --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -1 || true)
            if [ -n "$cid" ]; then
              gh api -X PATCH "repos/$REPO/issues/comments/$cid" -f body="$body" >/dev/null
              echo "Updated commit-list comment on PR #$pr ($pkg)."
            else
              gh api -X POST "repos/$REPO/issues/$pr/comments" -f body="$body" >/dev/null
              echo "Created commit-list comment on PR #$pr ($pkg)."
            fi
          }

          post cli packages/cli cli-v
          post extension packages/extension extension-v

  publish-extension:
    needs: release-please
    if: >-
      needs.release-please.outputs.extension_released == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'extension')
    runs-on: ubuntu-latest
    # Must match the Environment name set on the PyPI trusted publisher.
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip build "jupyterlab>=4.0.0,<5"

      - name: Install dependencies and build extension assets
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
          YARN_CHECKSUM_BEHAVIOR: update
        run: |
          set -eux
          jlpm install
          npm run build -w packages/core
          npm run build:prod -w packages/extension

      - name: Build Python package
        working-directory: packages/extension
        run: python -m build

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/extension/dist
          skip-existing: true

  publish-cli:
    needs: release-please
    if: >-
      needs.release-please.outputs.cli_released == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'cli')
    runs-on: ubuntu-latest
    # Must match the Environment name set on the npm trusted publisher.
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies and build CLI
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
          YARN_CHECKSUM_BEHAVIOR: update
        run: |
          set -eux
          corepack enable
          corepack prepare yarn@3.5.0 --activate
          yarn install
          npm run build -w packages/core
          npm run build -w packages/cli

      # setup-node's registry-url writes an .npmrc with `always-auth=true` and an
      # `_authToken=` line, which makes npm demand a token and skip OIDC. Strip
      # those lines (keep the registry) so npm performs the OIDC exchange.
      - name: Prepare npm for OIDC trusted publishing
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then echo "OIDC env: present"; else echo "OIDC env: MISSING"; fi
          cfg="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "npmrc path: $cfg"
          if [ -f "$cfg" ]; then
            sed -i '/_authToken=/d; /always-auth/d' "$cfg"
            echo "--- npmrc after strip ---"
            cat "$cfg"
          fi

      - name: Publish to npm via Trusted Publishing
        working-directory: packages/cli
        run: npm publish --provenance --access public --loglevel verbose

      - name: Dump npm debug log on failure
        if: failure()
        run: |
          echo "=== npm debug log ==="
          tail -n 80 "$(ls -t /home/runner/.npm/_logs/*-debug-0.log | head -1)" || true
